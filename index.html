<script>
// ==== Data (loaded from data.json at runtime) ====
let DATA = { generated_at: "loading…", campaigns: [], adsets: [], ads: [], actions: [] };
const CAMPAIGN_COLORS = {
  "120217478345100044": "#94a3b8",
  "120242830447810044": "#ec4899",
  "120241383251200044": "#f59e0b",
  "120240758552340044": "#3b82f6"
};
const CAMPAIGN_SHORT = {
  "120217478345100044": "生活習慣病",
  "120242830447810044": "小児科",
  "120241383251200044": "ダイエット",
  "120240758552340044": "ED"
};

const COL = { DATE:0, IMP:1, CLICK:2, CTR:3, SPEND:4, LINK:5, CV:6 };

const fmt = {
  yen: n => "¥" + (n||0).toLocaleString(),
  num: n => (n||0).toLocaleString(),
  pct: n => (n||0).toFixed(2) + "%",
  cpa: (spend, cv) => cv > 0 ? "¥" + Math.round(spend/cv).toLocaleString() : "-"
};

function sumDaily(daily, lookback) {
  const rows = lookback ? daily.slice(-lookback) : daily;
  return rows.reduce((a,r)=>({
    imp:a.imp+r[COL.IMP], click:a.click+r[COL.CLICK], spend:a.spend+r[COL.SPEND],
    link:a.link+r[COL.LINK], cv:a.cv+r[COL.CV]
  }), {imp:0,click:0,spend:0,link:0,cv:0});
}

function renderSummary() {
  const el = document.getElementById("summary");
  el.innerHTML = DATA.campaigns.map(c=>{
    const last7 = sumDaily(c.daily, 7);
    const ctr = last7.imp ? (last7.click/last7.imp*100) : 0;
    const cpa = last7.cv ? Math.round(last7.spend/last7.cv) : null;
    return `<div class="bg-white rounded-xl p-4 shadow-sm border-l-4" style="border-color:${c.color}">
      <div class="text-xs text-slate-500">${c.short} (直近7日)</div>
      <div class="text-2xl font-bold mt-1">${fmt.pct(ctr)}</div>
      <div class="text-xs text-slate-500 mt-2 flex justify-between">
        <span>spend ${fmt.yen(last7.spend)}</span><span>CV ${last7.cv}</span>
      </div>
      <div class="text-xs text-slate-500 mt-1">CPA ${cpa ? "¥"+cpa.toLocaleString() : "-"}</div>
    </div>`;
  }).join("");
}

// 科目 → campaign(s)/adset(s) マッピング
const DEPT_TO_CAMPAIGNS = {
  "小児科": ["120242830447810044"],
  "医療ダイエット": ["120241383251200044"],
  "ED": ["120240758552340044"],
  "糖尿病+痛風 (旧カラケン)": ["120217478345100044"]
};
const DEPT_DETAIL = {
  "小児科": { color:"#ec4899", campaigns:["120242830447810044"], adsets:["120242830447790044"], lps:[
    {url:"https://anycure.jp/mk/curenow/pediatrics/LP1/main.html", status:"公開中", variant:"LP1", axis:"通院ゼロ"},
    {url:"https://anycure.jp/lp/karaken/pediatrics/", status:"公開中 (旧)", variant:"karaken", axis:"アンケート"}
  ]},
  "糖尿病": { color:"#f97316", campaigns:["120217478345100044"], adsets:["120223788810460044"], lps:[
    {url:"https://anycure.jp/mk/curenow/diabetes/LP1/main.html", status:"公開中", variant:"LP1", axis:"通院ゼロ"}
  ]},
  "痛風": { color:"#a855f7", campaigns:["120217478345100044"], adsets:["120234490804810044"], lps:[
    {url:"https://anycure.jp/mk/curenow/gout/LP1/main.html", status:"準備中", variant:"LP1", axis:"危機感喚起"},
    {url:"https://karada-kenko.jp/lp/questionnaire/", status:"廃止予定", variant:"karaken", axis:"アンケート"}
  ]},

    {url:"-", status:"未作成", variant:"-", axis:"-"}
  ]},
  "ED": { color:"#3b82f6", campaigns:["120240758552340044"], adsets:[], lps:[
    {url:"-", status:"未作成", variant:"-", axis:"-"}
  ]}
};
const ADSETS = {
  "120242830447790044": { name:"260511_小児科_CV(linkClick)", daily_budget:10000, dept:"小児科",
    targeting:"女性主体 / 20-50歳 / 子育て関心 / 東京" },
  "120241383251150044": { name:"260422_ダイエット_CV(linkClick)", daily_budget:10000, dept:"医療ダイエット",
    targeting:"女性 / 18-40歳 / 全国" },
  "120234490804810044": { name:"診察予約_男性_通風_20251216", daily_budget:2000, dept:"痛風",
    targeting:"男性 / 30-65歳 / ビール・コレステロール関心 / 全国" },
  "120223788810460044": { name:"診察予約_女性_糖尿病_20250614", daily_budget:7000, dept:"糖尿病",
    targeting:"女性 / 25-65歳 / 健康・エクササイズ関心 / 全国" }
};

function renderTables(order) {
  const container = document.getElementById("tables_per_dept");
  const campMap = Object.fromEntries(DATA.campaigns.map(c=>[c.id, c]));
  container.innerHTML = Object.entries(DEPT_TO_CAMPAIGNS).map(([dept, cids]) => {
    // 同一日付で複数 campaign がある場合は合計する (今は1:1だが将来用)
    const dailyMap = {};
    cids.forEach(cid => {
      const c = campMap[cid]; if (!c) return;
      c.daily.forEach(r => {
        const d = r[COL.DATE];
        if (!dailyMap[d]) dailyMap[d] = {imp:0,click:0,spend:0,link:0,cv:0};
        dailyMap[d].imp += r[COL.IMP];
        dailyMap[d].click += r[COL.CLICK];
        dailyMap[d].spend += r[COL.SPEND];
        dailyMap[d].link += r[COL.LINK];
        dailyMap[d].cv += r[COL.CV];
      });
    });
    const rows = Object.entries(dailyMap).map(([d,v]) => ({
      date:d, ...v, ctr: v.imp ? (v.click/v.imp*100) : 0,
      cpc: v.click ? Math.round(v.spend/v.click) : null,
      cpa: v.cv ? Math.round(v.spend/v.cv) : null
    }));
    rows.sort((a,b) => order==="date_asc" ? a.date.localeCompare(b.date) : b.date.localeCompare(a.date));
    const total = rows.reduce((a,r) => ({
      imp:a.imp+r.imp, click:a.click+r.click, spend:a.spend+r.spend, link:a.link+r.link, cv:a.cv+r.cv
    }), {imp:0,click:0,spend:0,link:0,cv:0});
    const total_ctr = total.imp ? (total.click/total.imp*100).toFixed(2)+"%" : "-";
    const total_cpa = total.cv ? "¥"+Math.round(total.spend/total.cv).toLocaleString() : "-";
    const camp_color = campMap[cids[0]]?.color || "#999";

    return `<div>
      <div class="flex items-baseline gap-3 mb-2 pb-2 border-b" style="border-color:${camp_color}">
        <span class="inline-block w-3 h-3 rounded-full" style="background:${camp_color}"></span>
        <h3 class="text-base font-bold">${dept}</h3>
        <span class="text-xs text-slate-500">${rows.length} 日 / 累計: imp ${total.imp.toLocaleString()} / clicks ${total.click.toLocaleString()} / CTR ${total_ctr} / spend ${fmt.yen(total.spend)} / CV ${total.cv} / CPA ${total_cpa}</span>
      </div>
      <div class="overflow-x-auto">
        <table class="text-xs w-full">
          <thead class="bg-slate-100 text-slate-600">
            <tr>
              <th class="text-left px-2 py-1.5">日付</th>
              <th class="text-right px-2 py-1.5">表示回数</th>
              <th class="text-right px-2 py-1.5">クリック</th>
              <th class="text-right px-2 py-1.5">CTR</th>
              <th class="text-right px-2 py-1.5">link_click</th>
              <th class="text-right px-2 py-1.5">spend</th>
              <th class="text-right px-2 py-1.5">CPC</th>
              <th class="text-right px-2 py-1.5">CV (LINE)</th>
              <th class="text-right px-2 py-1.5">CPA</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map(r => `<tr class="border-b border-slate-100 hover:bg-slate-50">
              <td class="px-2 py-1 font-mono">${r.date}</td>
              <td class="px-2 py-1 text-right tabular-nums">${r.imp.toLocaleString()}</td>
              <td class="px-2 py-1 text-right tabular-nums">${r.click.toLocaleString()}</td>
              <td class="px-2 py-1 text-right tabular-nums ${r.ctr >= 10 ? 'text-green-600 font-semibold' : r.ctr < 1 ? 'text-red-500':''}">${r.ctr.toFixed(2)}%</td>
              <td class="px-2 py-1 text-right tabular-nums">${r.link.toLocaleString()}</td>
              <td class="px-2 py-1 text-right tabular-nums">¥${r.spend.toLocaleString()}</td>
              <td class="px-2 py-1 text-right tabular-nums text-slate-500">${r.cpc ? '¥'+r.cpc.toLocaleString() : '-'}</td>
              <td class="px-2 py-1 text-right tabular-nums ${r.cv >= 20 ? 'text-green-600 font-semibold' : ''}">${r.cv}</td>
              <td class="px-2 py-1 text-right tabular-nums ${r.cpa && r.cpa <= 500 ? 'text-green-600 font-semibold' : r.cpa && r.cpa >= 2000 ? 'text-red-500':''}">${r.cpa ? '¥'+r.cpa.toLocaleString() : '-'}</td>
            </tr>`).join("")}
          </tbody>
        </table>
      </div>
    </div>`;
  }).join("");
}

let chart;
function renderChart(metric) {
  // Common date axis = union of all campaign daily dates
  const allDates = Array.from(new Set(DATA.campaigns.flatMap(c=>c.daily.map(r=>r[COL.DATE])))).sort();
  const datasets = DATA.campaigns.map(c => {
    const map = Object.fromEntries(c.daily.map(r=>[r[COL.DATE], r]));
    return {
      label: c.short,
      data: allDates.map(d => {
        const r = map[d]; if (!r) return null;
        if (metric === "ctr") return r[COL.CTR];
        if (metric === "spend") return r[COL.SPEND];
        if (metric === "cv") return r[COL.CV];
        if (metric === "cpa") return r[COL.CV] > 0 ? Math.round(r[COL.SPEND]/r[COL.CV]) : null;
      }),
      borderColor: c.color, backgroundColor: c.color+"33", tension: 0.3, spanGaps: true, borderWidth: 2
    };
  });
  if (chart) chart.destroy();
  chart = new Chart(document.getElementById("campaign_chart"), {
    type: "line",
    data: { labels: allDates, datasets },
    options: {
      responsive: true,
      plugins: { legend: { position: "top" }},
      scales: { y: { beginAtZero: true, ticks: { callback: v => metric==="ctr" ? v+"%" : metric==="spend"||metric==="cpa" ? "¥"+v.toLocaleString() : v }}}
    }
  });
}

function getFilteredAds() {
  const dept = document.getElementById("filter_dept").value;
  const axis = document.getElementById("filter_axis").value;
  const cid = document.getElementById("filter_campaign").value;
  return DATA.ads.filter(a =>
    (!dept || (a.dept && a.dept.includes(dept))) &&
    (!axis || a.axis === axis) &&
    (!cid || a.campaign_id === cid)
  );
}

function renderGrid() {
  const ads = getFilteredAds();
  document.getElementById("ads_count").textContent = ads.length;
  const campMap = Object.fromEntries(DATA.campaigns.map(c=>[c.id, c]));
  document.getElementById("ads_grid").innerHTML = ads.map(a=>{
    const c = campMap[a.campaign_id] || {short:"?", color:"#999"};
    const lp = a.link ? new URL(a.link).pathname : "";
    const isOldLP = a.link && a.link.includes("karada-kenko.jp");
    return `<div class="ad-card bg-slate-50 rounded-lg overflow-hidden shadow-sm hover:shadow-md transition flex flex-col">
      <img src="${a.image}" alt="" class="w-full" loading="lazy" referrerpolicy="no-referrer" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'flex items-center justify-center bg-slate-200 text-slate-500 text-[10px] p-2 text-center',style:'aspect-ratio:1/1',textContent:'(画像URL期限切れ\\nMeta再取得で復旧)'}))">
      <div class="p-3 flex-1 flex flex-col">
        <div class="text-xs font-semibold truncate" title="${a.name}">${a.name}</div>
        <div class="flex flex-wrap gap-1 mt-2">
          <span class="text-[10px] px-2 py-0.5 rounded-full text-white" style="background:${c.color}">${c.short}</span>
          ${(a.dept||[]).map(d=>`<span class="text-[10px] px-2 py-0.5 rounded-full bg-slate-200">${d}</span>`).join("")}
          <span class="text-[10px] px-2 py-0.5 rounded-full bg-amber-100 text-amber-800">${a.axis}</span>
        </div>
        <div class="text-[10px] text-slate-400 mt-auto pt-2 truncate ${isOldLP ? 'text-red-500':''}" title="${a.link}">
          ${isOldLP ? '[旧karaken]':'→ '}${lp}
        </div>
      </div>
    </div>`;
  }).join("");
}

// init - fetch data.json then render
async function bootstrap() {
  try {
    const r = await fetch("./data.json?t=" + Date.now());
    if (!r.ok) throw new Error("data.json HTTP " + r.status);
    DATA = await r.json();
  } catch (e) {
    document.getElementById("generated_at").textContent = "読み込み失敗: " + e.message;
    return;
  }
  // augment campaigns with color/short from runtime maps
  DATA.campaigns.forEach(c => {
    c.color = CAMPAIGN_COLORS[c.id] || "#999";
    c.short = CAMPAIGN_SHORT[c.id] || c.name.slice(0, 12);
  });
  document.getElementById("generated_at").textContent = DATA.generated_at;
  const campSel = document.getElementById("filter_campaign");
  campSel.innerHTML = '<option value="">all</option>';
  DATA.campaigns.forEach(c => {
    const opt = document.createElement("option"); opt.value = c.id; opt.textContent = c.short;
    campSel.appendChild(opt);
  });
  renderSummary();
  renderChart("ctr");
  renderTables("date_desc");
  renderGrid();
  route(); // re-route in case detail page is open
}
bootstrap();

document.querySelectorAll(".metric-btn").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".metric-btn").forEach(b => b.className = "metric-btn px-3 py-1 rounded bg-slate-200");

    renderChart(btn.dataset.metric);
  };
});
document.querySelectorAll(".tablesort-btn").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".tablesort-btn").forEach(b => b.className = "tablesort-btn px-3 py-1 rounded bg-slate-200");

["filter_dept","filter_axis","filter_campaign"].forEach(id => {

// ==== 科目詳細ビュー ====
function adsForDept(dept) {
  const cfg = DEPT_DETAIL[dept]; if (!cfg) return [];
  return DATA.ads.filter(a =>
    cfg.adsets.includes(a.adset_id) ||
    (a.dept && a.dept.includes(dept))
  );
}

function dailyForDept(dept) {
  // adset単位の日次分割は要Meta token、ここでは campaign 単位の日次を流用
  const cfg = DEPT_DETAIL[dept]; if (!cfg) return [];
  const campMap = Object.fromEntries(DATA.campaigns.map(c=>[c.id, c]));
  const dailyMap = {};
  cfg.campaigns.forEach(cid => {
    const c = campMap[cid]; if (!c) return;
    c.daily.forEach(r => {
      const d = r[COL.DATE];
      if (!dailyMap[d]) dailyMap[d] = {imp:0,click:0,spend:0,link:0,cv:0};
      dailyMap[d].imp += r[COL.IMP];
      dailyMap[d].click += r[COL.CLICK];
      dailyMap[d].spend += r[COL.SPEND];
      dailyMap[d].link += r[COL.LINK];
      dailyMap[d].cv += r[COL.CV];
    });
  });
  return Object.entries(dailyMap).map(([d,v]) => ({
    date:d, ...v, ctr: v.imp ? (v.click/v.imp*100) : 0,
    cpc: v.click ? Math.round(v.spend/v.click) : null,
    cpa: v.cv ? Math.round(v.spend/v.cv) : null
  })).sort((a,b)=>b.date.localeCompare(a.date));
}

function weeklySummary(daily) {
  if (!daily.length) return [];
  // 直近の週から逆順、7日でグループ化
  const sorted = [...daily].sort((a,b)=>a.date.localeCompare(b.date));
  const weeks = [];
  for (let i = sorted.length - 1; i >= 0; i -= 7) {
    const slice = sorted.slice(Math.max(0, i-6), i+1);
    const sum = slice.reduce((a,r)=>({
      imp:a.imp+r.imp, click:a.click+r.click, spend:a.spend+r.spend, link:a.link+r.link, cv:a.cv+r.cv
    }), {imp:0,click:0,spend:0,link:0,cv:0});
    weeks.unshift({
      start: slice[0].date, end: slice[slice.length-1].date, days: slice.length,
      ...sum, ctr: sum.imp ? (sum.click/sum.imp*100) : 0,
      cpa: sum.cv ? Math.round(sum.spend/sum.cv) : null
    });
  }
  return weeks;
}

// ==== Notion 施策セクション ====
const ACTION_STATUS_ORDER = { "実行中":1, "検証中":2, "提案":3, "保留":4, "完了":5, "却下":6 };
const ACTION_PRIORITY_ORDER = { "P0":1, "P1":2, "P2":3 };
const ACTION_STATUS_STYLE = {
  "提案":   "bg-slate-200 text-slate-700",
  "実行中": "bg-blue-100 text-blue-800",
  "検証中": "bg-yellow-100 text-yellow-800",
  "完了":   "bg-green-100 text-green-800",
  "却下":   "bg-red-100 text-red-700",
  "保留":   "bg-red-100 text-red-700"
};
const ACTION_PRIORITY_STYLE = {
  "P0": "bg-red-100 text-red-700",
  "P1": "bg-yellow-100 text-yellow-800",
  "P2": "bg-slate-200 text-slate-600"
};
function escapeHtml(s) {
  return String(s == null ? "" : s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}
function actionsForDept(dept) {
  const list = (DATA.actions || []).filter(a => Array.isArray(a.depts) && a.depts.includes(dept));
  list.sort((a,b) => {
    const sa = ACTION_STATUS_ORDER[a.status] || 99;
    const sb = ACTION_STATUS_ORDER[b.status] || 99;
    if (sa !== sb) return sa - sb;
    const pa = ACTION_PRIORITY_ORDER[a.priority] || 99;
    const pb = ACTION_PRIORITY_ORDER[b.priority] || 99;
    if (pa !== pb) return pa - pb;
    return String(b.date||"").localeCompare(String(a.date||""));
  });
  return list;
}
function renderActionsTimeline(dept) {
  // 日付降順 → 年月でグルーピング (date field 優先、無ければ created_time fallback)
  const actions = actionsForDept(dept).map(a => ({...a, _ts: a.date || a.created_time || ""})).filter(a => a._ts);
  if (actions.length === 0) return "";
  const sorted = [...actions].sort((a,b) => (b._ts||"").localeCompare(a._ts||""));
  const groups = {};
  sorted.forEach(a => {
    const ym = (a._ts||"").slice(0,7);
    if (!groups[ym]) groups[ym] = [];
    groups[ym].push(a);
  });
  const months = Object.keys(groups).sort().reverse();
  return `
    <section class="bg-white rounded-xl p-5 mb-5 shadow-sm">
      <h3 class="font-semibold mb-4">施策タイムライン <span class="text-xs font-normal text-slate-500">${actions.length}件</span></h3>
      <div class="relative pl-6 border-l-2 border-slate-200 space-y-6">
        ${months.map(ym => `
          <div>
            <div class="text-xs font-bold text-slate-500 mb-2 -ml-8 pl-2 bg-slate-50 inline-block rounded">${ym}</div>
            <div class="space-y-2">
              ${groups[ym].map(a => {
                const statusCls = ACTION_STATUS_STYLE[a.status] || "bg-slate-200 text-slate-700";
                const prioCls = ACTION_PRIORITY_STYLE[a.priority] || "bg-slate-200 text-slate-600";
                const url = a.notion_url ? escapeHtml(a.notion_url) : "";
                const onclick = url ? `onclick="window.open('${url}','_blank','noopener')"` : "";
                const cursor = url ? "cursor-pointer" : "";
                const metrics = Array.isArray(a.metrics) ? a.metrics.join(" / ") : "";
                return `<div class="relative bg-slate-50 rounded-lg p-3 ${cursor} hover:shadow-sm transition" ${onclick}>
                  <div class="absolute -left-[1.85rem] top-4 w-3 h-3 rounded-full bg-indigo-500 border-2 border-white"></div>
                  <div class="flex items-center gap-2 flex-wrap text-xs mb-1">
                    <span class="font-mono text-slate-400">${escapeHtml(a._ts||"")}</span>
                    <span class="text-[10px] px-2 py-0.5 rounded-full ${statusCls}">${escapeHtml(a.status||"")}</span>
                    <span class="text-[10px] px-2 py-0.5 rounded-full ${prioCls}">${escapeHtml(a.priority||"")}</span>
                    <span class="text-[10px] px-2 py-0.5 rounded-full bg-slate-100 text-slate-700">${escapeHtml(a.category||"")}</span>
                  </div>
                  <div class="text-sm font-semibold text-slate-800">${escapeHtml(a.title||"")}</div>
                  ${a.expect ? `<div class="text-xs text-slate-600 mt-1">${escapeHtml(a.expect)}</div>` : ""}
                  ${metrics ? `<div class="text-[10px] text-slate-500 mt-1">指標: ${escapeHtml(metrics)}</div>` : ""}
                </div>`;
              }).join("")}
            </div>
          </div>
        `).join("")}
      </div>
    </section>
  `;
}

          </summary>
          <div class="overflow-x-auto px-3 pb-3">
            ${daily.length === 0 ? '<p class="text-xs text-slate-500 py-2">日次データなし</p>' :
            `<table class="text-xs w-full">
              <thead class="bg-slate-50 text-slate-600">
                <tr><th class="text-left px-2 py-1">日付</th><th class="text-right px-2 py-1">imp</th><th class="text-right px-2 py-1">click</th><th class="text-right px-2 py-1">CTR</th><th class="text-right px-2 py-1">link</th><th class="text-right px-2 py-1">spend</th><th class="text-right px-2 py-1">CV</th><th class="text-right px-2 py-1">CPA</th></tr>
              </thead>
              <tbody>
                ${daily.map(r => {
                  const cpaR = r[COL.CV] ? Math.round(r[COL.SPEND]/r[COL.CV]) : null;
                  return `<tr class="border-b border-slate-100">
                    <td class="px-2 py-0.5 font-mono">${r[COL.DATE]}</td>
                    <td class="px-2 py-0.5 text-right tabular-nums">${r[COL.IMP].toLocaleString()}</td>
                    <td class="px-2 py-0.5 text-right tabular-nums">${r[COL.CLICK]}</td>
                    <td class="px-2 py-0.5 text-right tabular-nums ${r[COL.CTR] >= 10 ? 'text-green-600 font-semibold' : r[COL.CTR] < 1 ? 'text-red-500':''}">${r[COL.CTR].toFixed(2)}%</td>
                    <td class="px-2 py-0.5 text-right tabular-nums">${r[COL.LINK]}</td>
                    <td class="px-2 py-0.5 text-right tabular-nums">¥${r[COL.SPEND].toLocaleString()}</td>
                    <td class="px-2 py-0.5 text-right tabular-nums ${r[COL.CV] >= 5 ? 'text-green-600 font-semibold' : ''}">${r[COL.CV]}</td>
                    <td class="px-2 py-0.5 text-right tabular-nums ${cpaR && cpaR <= 500 ? 'text-green-600 font-semibold' : cpaR && cpaR >= 2000 ? 'text-red-500':''}">${cpaR ? '¥'+cpaR.toLocaleString() : '-'}</td>
                  </tr>`;
                }).join("")}
              </tbody>
            </table>`}
          </div>
        </details>`;
      }).join("")}
    </section>
  `;
}

function route() {
  const hash = location.hash;
  const overview = document.getElementById("view_overview");
  const detail = document.getElementById("view_detail");
  document.querySelectorAll(".nav-link").forEach(a => {
    a.classList.remove("bg-indigo-600","text-white");
    a.classList.add("bg-slate-200");
  });
  if (hash.startsWith("#/dept/")) {
    const dept = decodeURIComponent(hash.replace("#/dept/", ""));
    overview.classList.add("hidden");
    detail.classList.remove("hidden");
    renderDeptDetail(dept);
    const link = document.querySelector(`.nav-link[href="#/dept/${dept}"]`);
    if (link) { link.classList.remove("bg-slate-200"); link.classList.add("bg-indigo-600","text-white"); }
  } else {
    overview.classList.remove("hidden");
    detail.classList.add("hidden");
    const link = document.querySelector('.nav-link[href="#"]');
    if (link) { link.classList.remove("bg-slate-200"); link.classList.add("bg-indigo-600","text-white"); }
  }
}
window.addEventListener("hashchange", route);

document.getElementById("refresh_btn").onclick = async () => {
  const btn = document.getElementById("refresh_btn");
  btn.disabled = true; btn.textContent = "Meta API取得中… (約10秒)";
  try {
    // Edge Function dashboard/refresh エンドポイント（同origin、Basic Authはbrowser cookieで継続）
    const r = await fetch("./refresh", { method: "POST" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const result = await r.json();
    btn.textContent = "更新完了 (" + (result.summary?.ads || 0) + " ads, " + (result.summary?.ad_days || 0) + " ad-days)";
    setTimeout(() => location.reload(), 1200);
  } catch (e) {
    btn.textContent = "失敗: " + (e.message || "");
    setTimeout(() => { btn.textContent = "Meta再取得"; btn.disabled = false; }, 3000);
  }
};
</script>
</body>
</html>
